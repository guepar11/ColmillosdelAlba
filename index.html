    <style> 
        :raíz {
            /* 1fsi */
            --rojo-core: #e60026;
            --oro-brillante: #ffcc00;
            --naranja-fuego: #ff8c00; 
            --blanco-puro: #ffffff;
            --fondo-negro: #050505;
            --tarjeta: rgba(20, 20, 20, 0.85);
            --ancho de la barra lateral: 260px;
            --gradiente-premium: gradiente lineal(135deg, var(--rojo-core), var(--oro-brillante));
        }
 
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--fondo-negro); color: #fff; margin: 0; display: flex; min-height: 100vh; overflow-x: hidden; }
 
        /* --- fondo --- */
        #bg-combat { 
            posición: fija; 
            superior: 0; 
            izquierda: 0; 
            ancho: 100%; 
            altura: 100%; 
            índice z: -1; 
            /* degradado del fondo */
            fondo: gradiente-lineal(-45deg, #3d0006, #6b1200, #3d0006, #1a0800);
            background-size: 400% 400%; /* 1fsi */
            animación: gradientFire 15s ease infinite; /* 1fsi */
            desbordamiento: oculto; 
        }
 
        /* animación 1fsi */
        @keyframes gradientFire {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
 
/* 1fsi xD */
.espada { 
    posición: absoluta; 
    ancho: 130px; 
    altura: 130px; 
    tamaño de fondo: contener; 
    background-repeat: no-repeat; 
    opacidad: 0; /* 1fsi */
    filtro: sombra paralela (0 0 15px var(--oro-brillante)); 
    animación: floatSwords 20s lineal infinito; 
    índice z: 0;
}
 
/* 1fsi :3 */
.s-neth { background-image: url('https://imgur.com/2hdd6Vm.png'); }
.s-diam { background-image: url('https://imgur.com/2hdd6Vm.png'); }
.s-gold { background-image: url('https://imgur.com/2hdd6Vm.png'); }
 
@keyframes floatSwords { 
    0% { transformar: trasladarY(110vh) rotar(0deg); opacidad: 0; } 
    10% { opacidad: 0,95; } 
    90% { opacidad: 0,95; } 
    100% { transformar: trasladarY(-20vh) rotar(360deg); opacidad: 0; } 
}
        /* --- 1fsi --- */
        .menu-toggle {
            posición: fija; arriba: 20px; izquierda: 20px; z-index: 1100;
            fondo: var(--gradiente-premium); borde: ninguno; color: negro;
            relleno: 12px 15px; radio de borde: 8px; cursor: puntero; grosor de fuente: negrita;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }
 
        /* --- 1fsi --- */
        .barra lateral { 
            ancho: var(--sidebar-width); fondo: linear-gradient(180deg, #0a0a0a 0%, #000 100%); 
            borde derecho: 1px sólido rgba(255, 255, 255, 0.1); relleno: 0; 
            posición: fija; altura: 100vh; índice z: 1000; 
            transición: transformar 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .sidebar.hidden { transform: translateX(-100%); }
 
        .encabezado-barra-lateral {
            margen superior: 80px;
            fondo: rgba(255, 255, 255, 0.03);
            relleno: 25px; alineación de texto: centro; borde superior: 1px sólido rgba(255,255,255,0.05); borde inferior: 1px sólido rgba(255,255,255,0.05);
            margen inferior: 20px;
        }
        .sidebar h2 { 
            font-family: 'Syncopate', sans-serif; font-size: 0.75rem; margin: 0;
            fondo: gradiente lineal(90deg, var(--blanco-puro), var(--oro-brillante));
            -webkit-background-clip: texto; -webkit-text-fill-color: transparente;
            espaciado entre letras: 3px; grosor de fuente: 900;
        }
 
        .nav-container { padding: 0 15px; }
        .nav-btn { 
            ancho: 100%; fondo: transparente; borde: 1px sólido transparente; 
            color: #888; relleno: 14px 18px; alineación de texto: izquierda; radio de borde: 10px; 
            cursor: puntero; transición: 0,3 s; margen inferior: 8 px; grosor de fuente: 700; 
            display: flex; align-items: center; gap: 12px; font-size: 0.85rem;
        }
        .nav-btn i { font-size: 1rem; transition: 0.3s; }
 
        .nav-btn:hover { color: var(--blanco-puro); fondo: rgba(255, 255, 255, 0,05); }
 
        .nav-btn.active { 
            fondo: rgba(230, 0, 38, 0.1); color: var(--blanco-puro); 
            borde: 1px sólido var(--rojo-core); sombra de caja: 0 0 15px rgba(230, 0, 38, 0.2);
        }
        .nav-btn.active i { color: var(--oro-brillante); }
 
        /* --- menú contenido 1fsi es pro --- */
        .contenido-principal { 
            margin-left: var(--sidebar-width); flex-grow: 1; padding: 60px; 
            z-index: 1; transición: margen 0,4s;
        }
        .main-content.full { margin-left: 0; }
 
        .section { display: none; animation: fadeIn 0.6s ease-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
 
        h1 { 
            font-family: 'Syncopate', sans-serif; font-size: 1.4rem; 
            fondo: gradiente lineal(90deg, var(--blanco-puro), var(--oro-brillante));
            -webkit-background-clip: texto; -webkit-text-fill-color: transparente;
            borde-izquierdo: 4px sólido var(--rojo-core); relleno-izquierdo: 20px; margen-inferior: 45px; 
        }
 
        /* --- líderes fsi --- */
        .leader-tree { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .leader-box { 
            fondo: gradiente lineal(145deg, #151515, #0a0a0a); relleno: 20px; radio de borde: 12px; 
            borde: 1px sólido rgba(255, 204, 0, 0.3); alineación de texto: centro; ancho mínimo: 180px; 
            posición: relativa; transición: 0,3 s;
        }
        .leader-box:hover { color-borde: var(--oro-brillante); sombra de cuadro: 0 0 20px rgba(255, 204, 0, 0.15); }
        .leader-box img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--rojo-core); margin-bottom: 12px; padding: 3px; background: #000; }
        .leader-box .rank { color: var(--oro-brillante); font-size: 0.65rem; font-weight: 900; text-transform: uppercase; display: block; margin-bottom: 8px; letter-spacing: 1px; }
        .line-v { width: 2px; height: 40px; background: linear-gradient(to bottom, var(--rojo-core), var(--oro-brillante)); }
 
        /* --- tarjetas fsi --- */
        .farm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .farm-card { background: var(--tarjeta); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); transition: 0.4s; backdrop-filter: blur(10px); }
        .farm-card:hover { transform: translateY(-8px); border-color: var(--oro-brillante); }
        .farm-card h3 { color: var(--blanco-puro); margin: 0; font-size: 1.1rem; }
        .farm-badge { display: inline-block; padding: 5px 10px; background: var(--gradiente-premium); color: #000; font-size: 0.65rem; font-weight: 900; border-radius: 4px; margin-top: 10px; text-transform: uppercase; }
 
        .roles-nav { display: flex; gap: 10px; flex-wrap: wrap; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 35px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-rol { background: #111; border: 1px solid #222; color: #aaa; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 0.7rem; transition: 0.3s; text-transform: uppercase; }
        .btn-rol:hover { color del borde: var(--rojo-core); color: #fff; }
        .btn-rol.active { fondo: var(--blanco-puro); color: #000; color-borde: var(--blanco-puro); sombra de cuadro: 0 0 15px rgba(255,255,255,0.2); }
 
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: rgba(255, 255, 255, 0.03); padding: 25px 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { background: rgba(255, 255, 255, 0.06); border-color: var(--rojo-core); }
        .card img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--oro-brillante); margin-bottom: 12px; }
 
        .btn-postular {
            display: inline-block; padding: 18px 40px; background: var(--gradiente-premium); color: #000; 
            text-decoration: none; border-radius: 10px; font-weight: 900; font-size: 0.9rem;
            box-shadow: 0 10px 20px rgba(230, 0, 38, 0.2); transition: 0.3s; letter-spacing: 1px;
        }
        .btn-postular:hover { transform: scale(1.05); box-shadow: 0 15px 25px rgba(255, 204, 0, 0.3); }
 
        .status-box { background: var(--tarjeta); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .status-box p { font-size: 1.1rem; font-weight: 600; margin: 15px 0; display: flex; align-items: center; gap: 15px; }
 
        /* imagen reclutamiento de 1fsi xD */
        .img-reclutamiento {
            ancho máximo: 100%;
            altura: automática;
            radio de borde: 15px;
            margen inferior: 30px;
            borde: 1px sólido rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        /* --- donadores de 1fsi --- */
        .donors-container { max-width: 900px; margin: 0 auto; }
        .refresh-tag { text-align: right; font-size: 0.75rem; color: #666; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        #timer { color: var(--oro-brillante); peso de fuente: negrita; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin: 60px 0 40px 0; height: 260px; }
        .podium-item { background: var(--tarjeta); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px 15px; text-align: center; position: relative; flex: 1; transition: 0.4s; backdrop-filter: blur(10px); }
        .podium-item img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--rojo-core); margin-bottom: 10px; background: #000; }
        .rank-1 { altura: 110%; color del borde: var(--oro-brillante); sombra de caja: 0 0 30px rgba(255,204,0,0.15); transformación: escala(1.15); índice z: 2; }
        .rank-1 img { border-color: var(--oro-brillante); width: 90px; height: 90px; }
        .rank-2 { altura: 90%; }
        .rank-3 { altura: 80%; }
        .crown { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 2rem; filter: drop-shadow(0 0 10px var(--oro-brillante)); }
        .money { display: block; color: #00ff88; font-weight: 900; font-size: 1.4rem; margin-top: 8px; }
        .other-donors { background: rgba(255,255,255,0.03); border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); margin-top: 20px; }
        .donor-row { display: flex; justify-content: space-between; padding: 18px 30px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; }
        .donor-row:last-child { border: none; }
        /* --- 1fsi es pro --- */
        .leader-tree { width: 100%; display: flex; flex-direction: column; align-items: center; }
 
        #rank-3 { 
            mostrar: cuadrícula; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            espacio: 20px; 
            ancho: 100%; 
            ancho máximo: 1100px; 
            margen superior: 30px; 
            justificar-contenido: centro;
        }
 
        .leader-box { 
            ancho: 100% !importante; 
            ancho máximo: 220px; 
            margen: 0 automático; 
        }
        /* Botón de música flotante 1fsi */
        #control-musical {
            posición: fija;
            parte inferior: 25px;
            derecha: 25px;
            Índice z: 9999;
            fondo: gradiente lineal(135deg, #e60026, #ffcc00);
            borde: 2px sólido #ffcc00;
            radio de borde: 50%;
            ancho: 55px;
            altura: 55px;
            cursor: puntero;
            tamaño de fuente: 1,6rem;
            pantalla: flexible;
            alinear-elementos: centro;
            justificar-contenido: centro;
            box-shadow: 0 0 20px rgba(230, 0, 38, 0.5);
            transición: todos 0,3 s de facilidad;
        }
        #music-control:hover { transform: scale(1.1); }
    </style>

    <script>
        // fsi paulo londra
función alternarMúsica() {
    const music = document.getElementById('bg-music');
    const emoji = document.getElementById('music-emoji');
    si (música.pausada) {
        music.play().catch(e => console.log("Error al reproducir: ", e));
        emoji.innerText = '🔊';
    } demás {
        música.pausa();
        emoji.innerText = '🔇';
    }
}
        función alternarMenú() {
            document.getElementById('sidebar').classList.toggle('hidden');
            document.getElementById('main-content').classList.toggle('full');
        }
 
        función crearEspadas() {
            const container = document.getElementById('bg-combat');
            const types = ['s-neth', 's-diam', 's-gold'];
            para(sea i=0; i<15; i++) {
                const s = document.createElement('div');
                s.className = `espada ${types[Math.floor(Math.random()*3)]}`;
                s.style.left = Math.random()*100 + 'vw';
                s.style.animationDelay = Math.random()*15 + 's';
                contenedor.añadirHijo(s);
            }
        }
        crearEspadas();
 
        función switchTab(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(window.innerWidth < 1024) toggleMenu();
        }
 
        const API_URL = "https://colmillosdelalba-bot-production.up.railway.app/miembros";
        let miembrosCache = [];
 
        const DATA_LIDERES = {
            supremo: { nick: "guepar_3111", rango: "👑 Líder Principal" },
            colider: { nick: "nicol3_espin0za", rango: "🥈 Colíder General" },
            divisiones: [
                { nick: "teamofurch", rango: "⚒️ Líder Construcción" },
                { nick: "Jowy19", rango: "📐 Colíder Construcción" },
                { nick: "postm_alone", rango: "⚔️ Líder PvP" },
                { nick: "sannvl", rango: "🛡️ Colíder PvP" },
                { nick: "Otungs", rango: "🛡️ Tester PvP" },
                { nick: "1fsi.", rango: "🔧 Líder Granjero" },
                { nick: "Jus.7", rango: "📜 Personal" },
                { nick: "Hell_8", rango: "📜 Staff" },
                { nick: "poco758", rango: "📜 Personal" },
                { nick: "renna6509", rango: "📜 Personal" }
            ]
        };
 
        función asíncrona inicializar() {
            intentar {
                const res = await fetch(`${API_URL}?t=${Date.now()}`);
                miembrosCache = await res.json();
                renderJerarquia();
                filtroTotal('Todos');
            } catch(e) { console.error(e); }
        }
 
        función renderJerarquia() {
            document.getElementById('rank-1').innerHTML = cardLider(DATA_LIDERES.supremo);
            document.getElementById('rank-2').innerHTML = cardLider(DATA_LIDERES.colider);
            document.getElementById('rank-3').innerHTML = DATA_LIDERES.divisiones.map(l => cardLider(l)).join('');
        }
 
        función cardLider(info) {
            const user = miembrosCache.find(m => (m.username||"").toLowerCase().includes(info.nick.toLowerCase()));
            const img = user ? user.avatar : 'https://cdn.discordapp.com/embed/avatars/0.png';
            return `<div class="leader-box"><span class="rank">${info.rango}</span><img src="${img}"><div style="font-weight:900; font-size:0.8rem; color: #fff;">${user ? (user.nickname || user.username) : info.nick}</div></div>`;
        }
 
        función filtroTotal(rolBusqueda, btn) {
            si(btn) {
                document.querySelectorAll('.btn-rol').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const grid = document.getElementById('lista-usuarios');
            const filtrados = rolBusqueda === 'Todos' 
                ? miembrosCache 
                : miembrosCache.filter(u => u.roles && u.roles.some(r => r.includes(rolBusqueda) || r.toLowerCase().includes(rolBusqueda.toLowerCase())));
 
            cuadrícula.innerHTML = filtrados.map(u => `
                <div class="card">
                    <img src="${u.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}">
                    <div style="font-weight:900; font-size:0.8rem; color: #ddd;">${u.nickname || u.username}</div>
                </div>
            `).join('');
        }
        sea ​​tiempoRestante = 300; 
        const API_DONACIONES = "https://colmillosdelalba-bot-production.up.railway.app/donaciones";
 
        función iniciarContador() {
            setInterval(() => {
                tiempoRestante--;
                si (tiempoRestante <= 0) {
                    tiempoRestante = 300;
                    cargarDonaciones();
                }
                let m = Math.floor(tiempoRestante / 60);
                sea ​​s = tiempoRestante % 60;
                document.getElementById('temporizador').innerText = `${m}:${s < 10? '0' : ''}${s}`;
            }, 1000);
        }
 
        función asíncrona cargarDonaciones() {
            intentar {
                const respuesta = await fetch(`${API_DONACIONES}?t=${Date.now()}`);
                const lista = espera respuesta.json();
                dibujarDonadores(lista);
            } catch (e) { console.log("Error al obtener donaciones."); }
        }
 
        function dibujarDonadores(datos) {
            const podio = document.getElementById('podium-area');
            const tabla = document.getElementById('list-area');
            podio.innerHTML = ''; tabla.innerHTML = '';
            datos.forEach((usuario, i) => {
                si(i < 3) {
                    const iconos = ['👑', '🥈', '🥉'];
                    podio.innerHTML += `<div class="podium-item rank-${i+1}"><div class="crown">${iconos[i]}</div><img src="${user.avatar}"><div style="font-weight:900">${user.username}</div><span class="money">$${user.cantidad.toLocaleString()}</span></div>`;
                } demás {
                    tabla.innerHTML += `<div class="donor-row"><span>#${i+1} <b>${user.username}</b></span><span style="color:#00ff88; font-weight:bold">$${user.cantidad.toLocaleString()}</span></div>`;
                }
            });
        }
 
        inicializar();
        iniciarContador();
        cargarDonaciones();
    </script>
